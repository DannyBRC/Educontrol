<div class="login-wrapper">

  <div class="deco-top-left"></div>
  <div class="deco-bottom-right"></div>
  <div class="deco-mid-right"></div>
  <div class="deco-mid-left"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <span class="brand-name">EduControl</span>
    </div>

    <h1 class="title">Bienvenido de vuelta</h1>
    <p class="subtitle">Ingresa tus credenciales para acceder al sistema</p>

    <form (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="email" class="field-label">Correo electrónico</label>
        <input id="email" type="email" class="field-input"
          placeholder="admin@educontrol.pe"
          [(ngModel)]="email" name="email" autocomplete="email"/>
      </div>

      <div class="field">
        <label for="password" class="field-label">Contraseña</label>
        <div class="input-wrapper">
          <input id="password" [type]="showPassword ? 'text' : 'password'"
            class="field-input password-input" placeholder="••••••••"
            [(ngModel)]="password" name="password" autocomplete="current-password"/>
          <button type="button" class="toggle-password" (click)="togglePassword()">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot-row">
        <button type="button" class="forgot-link" (click)="forgotPassword()">
          ¿Olvidé mi contraseña?
        </button>
      </div>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="spinner-row">
          <span class="spinner"></span> Ingresando...
        </span>
      </button>
    </form>

    <div class="demo-section">
      <span class="demo-label">Acceso de demostración</span>
      <div class="demo-buttons">
        <button type="button" class="demo-btn demo-admin"      (click)="loginDemo('admin')">Admin</button>
        <button type="button" class="demo-btn demo-profesor"   (click)="loginDemo('profesor')">Profesor</button>
        <button type="button" class="demo-btn demo-estudiante" (click)="loginDemo('estudiante')">Estudiante</button>
      </div>
    </div>
  </div>

</div>
